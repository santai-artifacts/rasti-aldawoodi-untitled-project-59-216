<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2433;
    --border: #2a3045;
    --snake: #00e5a0;
    --snake-dark: #00b07a;
    --food: #ff4f6d;
    --food-glow: rgba(255,79,109,0.4);
    --head: #fff;
    --text: #e8ecf4;
    --muted: #6b7a99;
    --accent: #6c8aff;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 560px;
  }

  header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--snake);
  }

  .scores {
    display: flex;
    gap: 20px;
  }

  .score-block {
    text-align: right;
  }

  .score-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-value {
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  #score-display { color: var(--snake); }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    box-shadow: 0 0 60px rgba(0,229,160,0.06), 0 20px 60px rgba(0,0,0,0.5);
  }

  canvas {
    display: block;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(13,15,20,0.88);
    backdrop-filter: blur(6px);
    border-radius: 16px;
    transition: opacity 0.2s;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .overlay-sub {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .overlay-score {
    font-size: 3rem;
    font-weight: 700;
    color: var(--snake);
    line-height: 1;
  }

  .overlay-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn {
    margin-top: 8px;
    padding: 12px 32px;
    background: var(--snake);
    color: #000;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 20px rgba(0,229,160,0.3);
  }

  .btn:hover { transform: scale(1.04); box-shadow: 0 0 28px rgba(0,229,160,0.5); }
  .btn:active { transform: scale(0.97); }

  /* Controls hint */
  .controls-hint {
    display: flex;
    gap: 24px;
    color: var(--muted);
    font-size: 0.75rem;
  }

  .hint-group { display: flex; align-items: center; gap: 6px; }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 600;
    background: var(--surface2);
    color: var(--text);
  }

  /* Mobile d-pad */
  .dpad {
    display: none;
    grid-template-areas:
      ". up ."
      "left . right"
      ". down .";
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 4px;
  }

  @media (max-width: 560px) or (pointer: coarse) {
    .dpad { display: grid; }
    .controls-hint { display: none; }
    canvas { width: min(90vw, 420px); height: min(90vw, 420px); }
  }

  .dpad-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  .dpad-btn:active { background: var(--border); }

  .dpad-btn[data-dir="UP"]    { grid-area: up; }
  .dpad-btn[data-dir="DOWN"]  { grid-area: down; }
  .dpad-btn[data-dir="LEFT"]  { grid-area: left; }
  .dpad-btn[data-dir="RIGHT"] { grid-area: right; }

  /* Level indicator */
  .level-bar-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .level-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .level-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .level-bar-fill {
    height: 100%;
    background: var(--snake);
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  #level-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--snake);
    min-width: 2ch;
    text-align: right;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <header>
    <h1>Snake</h1>
    <div class="scores">
      <div class="score-block">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
      </div>
      <div class="score-block">
        <div class="score-label">Best</div>
        <div class="score-value" id="best-display">0</div>
      </div>
    </div>
  </header>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="420" height="420"></canvas>

    <!-- Start screen -->
    <div class="overlay" id="start-overlay">
      <div class="overlay-title">🐍 Snake</div>
      <div class="overlay-sub">Use arrow keys or WASD to move</div>
      <button class="btn" id="start-btn">Start Game</button>
    </div>

    <!-- Pause screen -->
    <div class="overlay hidden" id="pause-overlay">
      <div class="overlay-title">Paused</div>
      <button class="btn" id="resume-btn">Resume</button>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="gameover-overlay">
      <div class="overlay-label">Game Over</div>
      <div class="overlay-score" id="final-score">0</div>
      <div class="overlay-sub" id="new-best-msg" style="color:var(--snake);display:none;font-weight:600;">New Best! 🎉</div>
      <button class="btn" id="restart-btn">Play Again</button>
    </div>
  </div>

  <div class="level-bar-wrap">
    <span class="level-label">Level</span>
    <div class="level-bar-bg"><div class="level-bar-fill" id="level-bar" style="width:0%"></div></div>
    <span id="level-num">1</span>
  </div>

  <div class="controls-hint">
    <div class="hint-group">
      <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
      or
      <span class="key">W</span><span class="key">S</span><span class="key">A</span><span class="key">D</span>
      <span>Move</span>
    </div>
    <div class="hint-group"><span class="key">P</span> Pause</div>
  </div>

  <div class="dpad">
    <button class="dpad-btn" data-dir="UP">▲</button>
    <button class="dpad-btn" data-dir="LEFT">◀</button>
    <button class="dpad-btn" data-dir="RIGHT">▶</button>
    <button class="dpad-btn" data-dir="DOWN">▼</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 21;
const ROWS = 21;
const CELL = canvas.width / COLS;

// Colors
const C = {
  bg:       '#0d0f14',
  grid:     '#131720',
  snake:    '#00e5a0',
  snakeDk:  '#00b07a',
  head:     '#ffffff',
  food:     '#ff4f6d',
  foodGlow: 'rgba(255,79,109,0.5)',
  border:   '#2a3045',
};

// Game state
let snake, dir, nextDir, food, score, best, gameState, tickMs, tickTimer, foodPulse;

const LEVELS = [
  { threshold: 0,  ms: 140 },
  { threshold: 5,  ms: 120 },
  { threshold: 10, ms: 100 },
  { threshold: 20, ms: 85  },
  { threshold: 35, ms: 70  },
  { threshold: 55, ms: 58  },
  { threshold: 80, ms: 48  },
];

function getLevel(s) {
  let lv = 1;
  for (let i = 0; i < LEVELS.length; i++) {
    if (s >= LEVELS[i].threshold) lv = i + 1;
  }
  return lv;
}

function getTickMs(s) {
  let ms = LEVELS[0].ms;
  for (const l of LEVELS) if (s >= l.threshold) ms = l.ms;
  return ms;
}

function getLevelProgress(s) {
  let lv = getLevel(s);
  if (lv >= LEVELS.length) return 1;
  const lo = LEVELS[lv - 1].threshold;
  const hi = LEVELS[lv] ? LEVELS[lv].threshold : lo + 25;
  return Math.min((s - lo) / (hi - lo), 1);
}

function randCell() {
  return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
}

function spawnFood(snk) {
  let f;
  do { f = randCell(); } while (snk.some(s => s.x === f.x && s.y === f.y));
  return f;
}

function initGame() {
  const mid = Math.floor(COLS / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  food = spawnFood(snake);
  score = 0;
  foodPulse = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = best || 0;
  const lv = getLevel(score);
  document.getElementById('level-num').textContent = lv;
  document.getElementById('level-bar').style.width = (getLevelProgress(score) * 100) + '%';
}

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function beep(freq, dur, type = 'square', vol = 0.08) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}

function eatSound() { beep(440, 0.08, 'sine', 0.12); beep(660, 0.06, 'sine', 0.08); }
function dieSound() { beep(120, 0.25, 'sawtooth', 0.1); beep(80, 0.4, 'sawtooth', 0.08); }

// Drawing
function drawGrid() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const px = seg.x * CELL, py = seg.y * CELL;
    const pad = isHead ? 1 : 2;
    const r = isHead ? 6 : 5;
    const t = 1 - (i / snake.length) * 0.5;

    // Body gradient feel
    if (isHead) {
      ctx.shadowBlur = 14;
      ctx.shadowColor = C.snake;
      ctx.fillStyle = C.head;
    } else {
      ctx.shadowBlur = 0;
      ctx.fillStyle = lerpColor(C.snakeDk, C.snake, t);
    }

    roundRect(ctx, px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, r);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Head eyes
    if (isHead) {
      ctx.fillStyle = '#0d0f14';
      const eyeSize = 3;
      const offsets = getEyeOffsets(dir);
      offsets.forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(px + CELL / 2 + ex, py + CELL / 2 + ey, eyeSize, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  });
}

function getEyeOffsets(d) {
  if (d.x === 1)  return [[4, -3], [4,  3]];
  if (d.x === -1) return [[-4, -3], [-4, 3]];
  if (d.y === -1) return [[-3, -4], [3, -4]];
  if (d.y === 1)  return [[-3,  4], [3,  4]];
  return [[3, -3], [3, 3]];
}

function drawFood() {
  const px = food.x * CELL + CELL / 2;
  const py = food.y * CELL + CELL / 2;
  const pulse = Math.sin(foodPulse) * 0.12 + 1;
  const r = (CELL / 2 - 3) * pulse;

  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = C.foodGlow;
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = C.food;
  ctx.fill();

  // Shine
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(px - r * 0.3, py - r * 0.3, r * 0.25, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();
  ctx.restore();
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16);
  const bh = parseInt(b.slice(1), 16);
  const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return `#${((1 << 24) | (rr << 16) | (rg << 8) | rb).toString(16).slice(1)}`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function render() {
  drawGrid();
  drawFood();
  drawSnake();
}

// Game loop
let lastTick = 0;
let animId;

function gameLoop(ts) {
  animId = requestAnimationFrame(gameLoop);
  foodPulse += 0.06;

  if (gameState === 'playing') {
    if (ts - lastTick >= tickMs) {
      lastTick = ts;
      tick();
    }
  }
  render();
}

function tick() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    tickMs = getTickMs(score);
    food = spawnFood(snake);
    eatSound();
    updateUI();
  } else {
    snake.pop();
  }
}

function endGame() {
  gameState = 'gameover';
  dieSound();
  const isNew = score > (best || 0);
  if (isNew) best = score;
  document.getElementById('final-score').textContent = score;
  document.getElementById('new-best-msg').style.display = isNew ? 'block' : 'none';
  document.getElementById('gameover-overlay').classList.remove('hidden');
  updateUI();
}

// Controls
const OPPOSITE = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };
const DIR_MAP = { UP: {x:0,y:-1}, DOWN:{x:0,y:1}, LEFT:{x:-1,y:0}, RIGHT:{x:1,y:0} };

let currentDirKey = 'RIGHT';

function tryChangeDir(newKey) {
  if (OPPOSITE[currentDirKey] === newKey) return;
  nextDir = DIR_MAP[newKey];
  currentDirKey = newKey;
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
    w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT',
    W:'UP', S:'DOWN', A:'LEFT', D:'RIGHT',
  };
  if (map[e.key]) {
    e.preventDefault();
    if (gameState === 'playing') tryChangeDir(map[e.key]);
  }
  if ((e.key === 'p' || e.key === 'P') && gameState === 'playing') togglePause();
  if ((e.key === 'p' || e.key === 'P') && gameState === 'paused') togglePause();
});

document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (gameState === 'playing') tryChangeDir(btn.dataset.dir);
  });
});

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pause-overlay').classList.remove('hidden');
  } else if (gameState === 'paused') {
    gameState = 'playing';
    lastTick = performance.now();
    document.getElementById('pause-overlay').classList.add('hidden');
  }
}

// Buttons
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').classList.add('hidden');
  startGame();
});
document.getElementById('resume-btn').addEventListener('click', () => togglePause());
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.add('hidden');
  startGame();
});

function startGame() {
  initGame();
  tickMs = getTickMs(0);
  gameState = 'playing';
  lastTick = performance.now();
  currentDirKey = 'RIGHT';
}

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) tryChangeDir(dx > 0 ? 'RIGHT' : 'LEFT');
  else tryChangeDir(dy > 0 ? 'DOWN' : 'UP');
  touchStart = null;
}, { passive: true });

// Boot
best = 0;
gameState = 'idle';
render();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
